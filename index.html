<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Personal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border: 1px solid #333; }
        .seccion-vista { display: none; }
        .seccion-vista.activa { display: block; }
    </style>
</head>
<body>

    <div id="vista-login" class="seccion-vista activa">
        <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
            <div class="card p-4 w-100" style="max-width: 400px;">
                <h4 class="text-center mb-3">Identificación</h4>
                <input type="text" id="nombreUsuario" class="form-control mb-3" placeholder="Ingresa tu nombre...">
                <button onclick="entrarAlSistema()" class="btn btn-primary w-100">Entrar</button>
            </div>
        </div>
    </div>

    <div id="vista-sistema" class="seccion-vista">
        <div class="container mt-4">
            <div class="card p-4 mb-4">
                <h5>Registrar Trabajador</h5>
                <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre completo">
                <input type="text" id="cedula" class="form-control mb-2" placeholder="Cédula">
                <button onclick="guardarTrabajador()" class="btn btn-success w-100">Guardar</button>
            </div>
            <table class="table table-dark table-hover">
                <thead><tr><th>Nombre</th><th>Cédula</th><th>Registrado por</th><th>Acción</th></tr></thead>
                <tbody id="tabla-cuerpo"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAs7_XG2Vl4Z6J8mN0PqR-sTvwU_Xyz123", 
            databaseURL: "https://control-personal-31bc1-default-rtdb.firebaseio.com",
            projectId: "control-personal-31bc1"
        };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('personal');
        let usuarioActual = "";

        function entrarAlSistema() {
            usuarioActual = document.getElementById('nombreUsuario').value.trim();
            if(usuarioActual) {
                document.getElementById('vista-login').classList.remove('activa');
                document.getElementById('vista-sistema').classList.add('activa');
                cargarDatos();
            } else { alert("Por favor escribe tu nombre"); }
        }

        function guardarTrabajador() {
            const nom = document.getElementById('nombre').value;
            const ced = document.getElementById('cedula').value;
            if(nom && ced) {
                dbRef.push({ nombre: nom, cedula: ced, quien: usuarioActual });
                document.getElementById('nombre').value = "";
                document.getElementById('cedula').value = "";
            }
        }

        function cargarDatos() {
            dbRef.on('value', (snap) => {
                let html = "";
                snap.forEach((c) => {
                    let d = c.val();
                    html += `<tr><td>${d.nombre}</td><td>${d.cedula}</td><td>${d.quien}</td>
                    <td><button onclick="dbRef.child('${c.key}').remove()" class="btn btn-danger btn-sm">X</button></td></tr>`;
                });
                document.getElementById('tabla-cuerpo').innerHTML = html;
            });
        }
    </script>
</body>
</html>
