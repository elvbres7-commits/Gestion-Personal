<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Pro | Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #4f46e5; --bg: #f3f4f6; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: #1f2937; }
        .app-card { background: white; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; overflow: hidden; }
        .header-bg { background: linear-gradient(135deg, var(--accent), #818cf8); color: white; padding: 2rem; border-radius: 0 0 30px 30px; }
        .list-item { border-left: 4px solid var(--accent); transition: 0.3s; }
        .list-item:hover { background: #f9fafb; transform: translateX(5px); }
        .btn-action { border-radius: 50%; width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; }
        .vista { display: none; } .activa { display: block; }
    </style>
</head>
<body>

<div id="login" class="vista activa container mt-5" style="max-width: 400px;">
    <div class="app-card p-4 text-center">
        <div class="mb-4 text-primary"><i class="fas fa-lock fa-3x"></i></div>
        <h4 class="mb-3">Autenticación</h4>
        <input type="password" id="pass" class="form-control mb-3" placeholder="Clave Administrador">
        <button onclick="verificar()" class="btn btn-primary w-100 py-2">Acceder</button>
    </div>
</div>

<div id="sistema" class="vista">
    <div class="header-bg">
        <h3>Panel de Control RH</h3>
        <p class="opacity-75">Gestión de Personal Activo</p>
    </div>
    
    <div class="container mt-n4">
        <div id="form" class="vista app-card p-4">
            <h5 class="mb-4 text-primary"><i class="fas fa-user-plus me-2"></i> Nuevo Registro</h5>
            <div class="row g-3">
                <div class="col-12 col-md-6"><label class="small text-muted">Nombres y Apellidos</label><input type="text" id="nombres" class="form-control"></div>
                <div class="col-12 col-md-6"><label class="small text-muted">Cédula</label><input type="text" id="cedula" class="form-control"></div>
                <div class="col-6 col-md-3"><label class="small text-muted">Teléfono</label><input type="text" id="telefono" class="form-control"></div>
                <div class="col-6 col-md-3"><label class="small text-muted">Cargo</label><input type="text" id="cargo" class="form-control"></div>
                <div class="col-12"><label class="small text-muted">Dirección</label><textarea id="direccion" class="form-control"></textarea></div>
                <button onclick="guardar()" class="btn btn-primary mt-3">Guardar Registro</button>
            </div>
        </div>

        <div id="lista" class="vista activa">
            <input type="text" class="form-control mb-4" placeholder="🔍 Buscar por cédula..." onkeyup="filtrar(this.value)">
            <div id="tabla-body"></div>
        </div>
    </div>
</div>

<div class="fixed-bottom bg-white border-top p-2 d-flex justify-content-around">
    <button class="btn" onclick="cambiarVista('lista')"><i class="fas fa-list"></i><br><small>Lista</small></button>
    <button class="btn" onclick="cambiarVista('form')"><i class="fas fa-plus"></i><br><small>Nuevo</small></button>
</div>

<script>
    // Configuración Firebase (igual que antes)
    const db = firebase.initializeApp({
        apiKey: "AIzaSyAs7_XG2Vl4Z6J8mN0PqR-sTvwU_Xyz123",
        databaseURL: "https://control-personal-31bc1-default-rtdb.firebaseio.com"
    }).database().ref('personal');

    function verificar() {
        if(document.getElementById('pass').value === "administrador") {
            document.getElementById('login').classList.remove('activa');
            document.getElementById('sistema').classList.add('activa');
            cargar();
        } else { alert("Acceso denegado"); }
    }

    function cambiarVista(v) {
        document.querySelectorAll('.vista').forEach(e => {
            if(e.id !== 'login' && e.id !== 'sistema') e.classList.remove('activa');
        });
        document.getElementById(v).classList.add('activa');
    }

    function guardar() {
        const data = {
            nombres: document.getElementById('nombres').value,
            cedula: document.getElementById('cedula').value,
            telefono: document.getElementById('telefono').value,
            cargo: document.getElementById('cargo').value,
            direccion: document.getElementById('direccion').value
        };
        db.push(data).then(() => { alert("Guardado"); location.reload(); });
    }

    function cargar() {
        db.on('value', snap => {
            let html = '';
            snap.forEach(c => {
                let d = c.val();
                html += `<div class="app-card list-item p-3 mb-3 fila" data-cedula="${d.cedula}">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><h6 class="mb-0">${d.nombres}</h6><small class="text-muted">ID: ${d.cedula}</small></div>
                        <div>
                            <button class="btn btn-light btn-action" onclick="alert('Cargo: ${d.cargo}\\nDir: ${d.direccion}')"><i class="fas fa-eye text-primary"></i></button>
                            <button class="btn btn-light btn-action" onclick="db.child('${c.key}').remove()"><i class="fas fa-trash text-danger"></i></button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('tabla-body').innerHTML = html;
        });
    }

    function filtrar(v) {
        document.querySelectorAll('.fila').forEach(f => f.style.display = f.dataset.cedula.includes(v) ? "block" : "none");
    }
</script>
</body>
</html>
