<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise HR Suite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.9); --primary: #0f172a; }
        body { background: #0f172a; font-family: 'Inter', sans-serif; color: #334155; }
        .dashboard-container { background: var(--glass); min-height: 100vh; border-radius: 40px; margin: 20px; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-group-custom { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px 15px; }
        .btn-elite { background: var(--primary); color: white; border-radius: 12px; transition: all 0.3s; }
        .btn-elite:hover { background: #1e293b; transform: translateY(-2px); }
        .card-list { border-radius: 20px; border: 1px solid #e2e8f0; padding: 20px; margin-bottom: 15px; transition: 0.3s; }
        .card-list:hover { border-color: var(--primary); }
        .vista { display: none; } .activa { display: block; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div id="login" class="vista activa text-center pt-5">
        <h2 class="fw-bold text-primary">Enterprise HR Suite</h2>
        <p class="text-muted">Acceso restringido a personal administrativo</p>
        <div class="mx-auto" style="max-width:350px">
            <input type="password" id="pass" class="form-control form-control-lg mb-3" placeholder="Clave secreta">
            <button onclick="verificar()" class="btn btn-elite w-100 py-3">Ingresar al Portal</button>
        </div>
    </div>

    <div id="sistema" class="vista">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold">Directorio Corporativo</h4>
            <div class="btn-group">
                <button class="btn btn-outline-secondary" onclick="cambiarVista('lista')"><i class="fas fa-th-list"></i></button>
                <button class="btn btn-outline-secondary" onclick="cambiarVista('form')"><i class="fas fa-plus"></i></button>
            </div>
        </header>

        <div id="form" class="vista row g-3">
            <h5 class="text-primary mb-3">Nuevo Colaborador</h5>
            <div class="col-md-6"><input type="text" id="nombres" class="form-control" placeholder="Nombre completo"></div>
            <div class="col-md-6"><input type="text" id="cedula" class="form-control" placeholder="Cédula"></div>
            <div class="col-md-4"><input type="text" id="telefono" class="form-control" placeholder="Teléfono"></div>
            <div class="col-md-4"><input type="email" id="correo" class="form-control" placeholder="Email"></div>
            <div class="col-md-4"><input type="text" id="cargo" class="form-control" placeholder="Cargo"></div>
            <div class="col-12"><textarea id="direccion" class="form-control" rows="3" placeholder="Dirección"></textarea></div>
            <button onclick="guardar()" class="btn btn-elite w-100 py-3">Finalizar Registro</button>
        </div>

        <div id="lista" class="vista activa">
            <div class="input-group mb-4">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-search"></i></span>
                <input type="text" class="form-control border-start-0" placeholder="Filtrar por cédula..." onkeyup="filtrar(this.value)">
            </div>
            <div id="tabla-body"></div>
        </div>
    </div>
</div>

<script>
    const db = firebase.initializeApp({
        apiKey: "AIzaSyAs7_XG2Vl4Z6J8mN0PqR-sTvwU_Xyz123",
        databaseURL: "https://control-personal-31bc1-default-rtdb.firebaseio.com"
    }).database().ref('personal');

    function verificar() {
        if(document.getElementById('pass').value === "administrador") {
            document.getElementById('login').classList.remove('activa');
            document.getElementById('sistema').classList.add('activa');
        } else { alert("Acceso no autorizado"); }
    }

    function cambiarVista(v) {
        document.querySelectorAll('.vista').forEach(e => {
            if(e.id !== 'login' && e.id !== 'sistema') e.classList.remove('activa');
        });
        document.getElementById(v).classList.add('activa');
    }

    function guardar() {
        const data = {
            nombres: document.getElementById('nombres').value,
            cedula: document.getElementById('cedula').value,
            telefono: document.getElementById('telefono').value,
            correo: document.getElementById('correo').value,
            cargo: document.getElementById('cargo').value,
            direccion: document.getElementById('direccion').value
        };
        db.push(data).then(() => { alert("Registro exitoso"); location.reload(); });
    }

    function cargar() {
        db.on('value', snap => {
            let html = '';
            snap.forEach(c => {
                let d = c.val();
                html += `<div class="card-list fila" data-cedula="${d.cedula}">
                    <div class="d-flex justify-content-between">
                        <div><h6 class="mb-1">${d.nombres}</h6><span class="badge bg-light text-dark">${d.cargo}</span></div>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-outline-primary" onclick="alert('Email: ${d.correo}\\nTel: ${d.telefono}')">Info</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="db.child('${c.key}').remove()">X</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('tabla-body').innerHTML = html;
        });
    }
    // Ejecutar carga al cargar la vista
    document.querySelector('[onclick*="lista"]').addEventListener('click', cargar);
    cargar();
</script>
</body>
</html>
