<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise HR Suite</title>
    <!-- Estilos de Alta Fidelidad -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand: #0f172a; --surface: #ffffff; }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; color: #1e293b; }
        .app-container { max-width: 500px; margin: 0 auto; padding: 20px; }
        /* Diseño de Tarjeta Premium */
        .premium-card { background: var(--surface); border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); padding: 25px; border: 1px solid #e2e8f0; }
        /* Botones Elegantes */
        .btn-elite { background: var(--brand); color: white; border-radius: 12px; padding: 12px; font-weight: 600; transition: 0.3s; }
        .btn-elite:hover { background: #334155; color: white; }
        /* Listado estilo corporativo */
        .staff-item { border-bottom: 1px solid #f1f5f9; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .vista { display: none; } .activa { display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="sistema" class="pt-4">
        <!-- HEADER corporativo -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold m-0">Directorio Corporativo</h5>
            <div class="btn-group">
                <button class="btn btn-sm btn-light" onclick="cambiarVista('lista')"><i class="fas fa-th-list"></i></button>
                <button class="btn btn-sm btn-light" onclick="cambiarVista('form')"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <!-- FORMULARIO PREMIUM -->
        <div id="form" class="vista premium-card">
            <h6 class="text-uppercase text-muted mb-3">Nuevo Colaborador</h6>
            <input type="text" id="nombres" class="form-control mb-2" placeholder="Nombre completo">
            <input type="text" id="cedula" class="form-control mb-2" placeholder="Cédula">
            <input type="text" id="telefono" class="form-control mb-2" placeholder="Teléfono">
            <input type="text" id="cargo" class="form-control mb-2" placeholder="Cargo">
            <textarea id="direccion" class="form-control mb-3" placeholder="Dirección"></textarea>
            <button onclick="guardar()" class="btn btn-elite w-100">Registrar en Sistema</button>
        </div>

        <!-- LISTADO PREMIUM -->
        <div id="lista" class="vista activa premium-card">
            <input type="text" class="form-control mb-3 border-0 bg-light" placeholder="🔍 Buscar por cédula..." onkeyup="filtrar(this.value)">
            <div id="tabla-body"></div>
        </div>
    </div>
</div>

<!-- Modal de detalle profesional -->
<div class="modal fade" id="modalInfo" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg p-4" style="border-radius:24px">
            <h5 class="modal-title" id="infoTitle">Detalles</h5>
            <div class="modal-body" id="infoBody"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
    const db = firebase.initializeApp({
        apiKey: "AIzaSyAs7_XG2Vl4Z6J8mN0PqR-sTvwU_Xyz123",
        databaseURL: "https://control-personal-31bc1-default-rtdb.firebaseio.com"
    }).database().ref('personal');

    // Funciones optimizadas para navegación fluida
    function cambiarVista(v) {
        document.querySelectorAll('.vista').forEach(e => e.classList.remove('activa'));
        document.getElementById(v).classList.add('activa');
    }

    function ver(k) {
        db.child(k).once('value', s => {
            let d = s.val();
            document.getElementById('infoTitle').innerText = d.nombres;
            document.getElementById('infoBody').innerHTML = `<p class="text-muted">Cargo: ${d.cargo}<br>Email: ${d.correo}<br>Tel: ${d.telefono}</p>`;
            new bootstrap.Modal(document.getElementById('modalInfo')).show();
        });
    }

    // El resto de la lógica (guardar/cargar) se mantiene, pero con la nueva interfaz.
</script>
</body>
</html>
