<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Admin Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { background: #eef2f3; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
        .card-app { background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; margin: 15px; padding: 20px; }
        .btn-primary { background: #4a90e2; border: none; border-radius: 12px; }
        .nav-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; justify-content: space-around; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .vista { display: none; } .activa { display: block; }
        .item-list { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="login" class="vista activa container mt-5">
        <div class="card-app text-center">
            <i class="fas fa-lock fa-3x text-primary mb-3"></i>
            <h4>Acceso al Sistema</h4>
            <input type="password" id="pass" class="form-control mb-3" placeholder="Clave secreta">
            <button onclick="verificar()" class="btn btn-primary w-100">Ingresar</button>
        </div>
    </div>

    <div id="sistema" class="vista">
        <div id="form" class="vista card-app">
            <h5 class="mb-4">Registrar Personal</h5>
            <input type="text" id="nombres" class="form-control mb-2" placeholder="Nombre completo">
            <input type="text" id="cedula" class="form-control mb-2" placeholder="Cédula">
            <input type="text" id="telefono" class="form-control mb-2" placeholder="Teléfono">
            <input type="email" id="correo" class="form-control mb-2" placeholder="Correo">
            <textarea id="direccion" class="form-control mb-3" placeholder="Dirección"></textarea>
            <button onclick="guardar()" class="btn btn-success w-100">Guardar Trabajador</button>
        </div>

        <div id="lista" class="vista activa card-app">
            <input type="text" class="form-control mb-3" placeholder="🔍 Buscar por cédula..." onkeyup="filtrar(this.value)">
            <div id="tabla-body"></div>
        </div>
    </div>

    <div class="nav-fixed">
        <a class="text-decoration-none text-dark" onclick="cambiarVista('lista')"><i class="fas fa-list fa-lg"></i><br>Lista</a>
        <a class="text-decoration-none text-dark" onclick="cambiarVista('form')"><i class="fas fa-user-plus fa-lg"></i><br>Registrar</a>
    </div>

    <script>
        const db = firebase.initializeApp({
            apiKey: "AIzaSyAs7_XG2Vl4Z6J8mN0PqR-sTvwU_Xyz123",
            databaseURL: "https://control-personal-31bc1-default-rtdb.firebaseio.com"
        }).database().ref('personal');

        function verificar() {
            if(document.getElementById('pass').value === "administrador") {
                document.getElementById('login').classList.remove('activa');
                document.getElementById('sistema').classList.add('activa');
                cargar();
            } else { alert("Clave incorrecta"); }
        }

        function cambiarVista(v) {
            document.querySelectorAll('.vista').forEach(e => {
                if(e.id !== 'login' && e.id !== 'sistema') e.classList.remove('activa');
            });
            document.getElementById(v).classList.add('activa');
        }

        function guardar() {
            const data = {
                nombres: document.getElementById('nombres').value,
                cedula: document.getElementById('cedula').value,
                telefono: document.getElementById('telefono').value,
                correo: document.getElementById('correo').value,
                direccion: document.getElementById('direccion').value
            };
            
            if(!data.nombres || !data.cedula) { alert("Nombre y Cédula son obligatorios"); return; }

            db.push(data).then(() => {
                alert("Guardado correctamente");
                ['nombres','cedula','telefono','correo','direccion'].forEach(i => document.getElementById(i).value = "");
                cambiarVista('lista');
            });
        }

        function cargar() {
            db.on('value', snap => {
                let html = '';
                snap.forEach(c => {
                    let d = c.val();
                    html += `<div class="item-list fila" data-cedula="${d.cedula}">
                        <strong>${d.nombres}</strong><br>
                        <small>Cédula: ${d.cedula} | Tel: ${d.telefono}</small>
                        <button class="btn btn-sm btn-danger float-end" onclick="db.child('${c.key}').remove()">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>`;
                });
                document.getElementById('tabla-body').innerHTML = html;
            });
        }

        function filtrar(val) {
            document.querySelectorAll('.fila').forEach(f => f.style.display = f.dataset.cedula.includes(val) ? "block" : "none");
        }
    </script>
</body>
</html>
