<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Admin Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --sidebar-bg: #2d3436; --main-bg: #f4f7f6; }
        body { background: var(--main-bg); font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: var(--sidebar-bg); min-height: 100vh; color: #fff; padding: 20px; }
        .card-pro { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); background: white; }
        .nav-link { color: #b2bec3; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: #0984e3; color: white; }
        .vista { display: none; } .activa { display: block; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <h5 class="mb-4 text-center"><i class="fas fa-user-shield"></i> Admin Panel</h5>
            <div class="nav-link active" onclick="cambiarVista('lista', this)"><i class="fas fa-list me-2"></i>Personal</div>
            <div class="nav-link" onclick="cambiarVista('form', this)"><i class="fas fa-plus me-2"></i>Registrar</div>
        </div>

        <div class="col-md-10 p-4">
            <div id="login" class="vista activa card-pro p-5 text-center" style="max-width: 400px; margin: 10% auto;">
                <h4>Acceso Administrativo</h4>
                <input type="password" id="pass" class="form-control my-3" placeholder="Clave secreta">
                <button onclick="verificar()" class="btn btn-primary w-100">Entrar</button>
            </div>

            <div id="sistema" class="vista">
                <div id="form" class="vista card-pro p-4">
                    <h4 id="tituloForm" class="mb-4">Nuevo Trabajador</h4>
                    <input type="hidden" id="editKey">
                    <div class="row g-3">
                        <div class="col-md-6"><input type="text" id="nombres" class="form-control" placeholder="Nombres y Apellidos"></div>
                        <div class="col-md-6"><input type="text" id="cedula" class="form-control" placeholder="Cédula"></div>
                        <div class="col-md-4"><input type="text" id="telefono" class="form-control" placeholder="Teléfono"></div>
                        <div class="col-md-4"><input type="email" id="correo" class="form-control" placeholder="Correo"></div>
                        <div class="col-md-4"><input type="date" id="fechaNac" class="form-control"></div>
                        <div class="col-md-6"><input type="text" id="cargo" class="form-control" placeholder="Cargo"></div>
                        <div class="col-md-6"><input type="date" id="fechaIng" class="form-control"></div>
                        <div class="col-12"><textarea id="direccion" class="form-control" placeholder="Dirección"></textarea></div>
                        <button onclick="guardar()" class="btn btn-success w-100">Guardar Información</button>
                    </div>
                </div>

                <div id="lista" class="vista activa card-pro p-4">
                    <input type="text" id="buscar" class="form-control mb-3" placeholder="🔍 Buscar por cédula..." onkeyup="filtrar()">
                    <table class="table table-hover">
                        <thead><tr><th>Nombre</th><th>Cédula</th><th>Acciones</th></tr></thead>
                        <tbody id="tabla-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalDetalles" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content p-4" id="contenidoDetalles"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const db = firebase.initializeApp({
        apiKey: "AIzaSyAs7_XG2Vl4Z6J8mN0PqR-sTvwU_Xyz123",
        databaseURL: "https://control-personal-31bc1-default-rtdb.firebaseio.com"
    }).database().ref('personal');

    function verificar() {
        if(document.getElementById('pass').value === "administrador") {
            document.getElementById('login').classList.remove('activa');
            document.getElementById('sistema').classList.add('activa');
            cargar();
        } else { alert("Clave incorrecta"); }
    }

    function cambiarVista(v, el) {
        document.querySelectorAll('.vista').forEach(e => e.id !== 'login' && e.id !== 'sistema' ? e.classList.remove('activa') : null);
        document.getElementById(v).classList.add('activa');
        if(el) {
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    }

    function guardar() {
        let data = {
            nombres: document.getElementById('nombres').value,
            cedula: document.getElementById('cedula').value,
            telefono: document.getElementById('telefono').value,
            correo: document.getElementById('correo').value,
            fechaNac: document.getElementById('fechaNac').value,
            sexo: document.getElementById('sexo').value,
            cargo: document.getElementById('cargo').value,
            fechaIng: document.getElementById('fechaIng').value,
            direccion: document.getElementById('direccion').value
        };
        let key = document.getElementById('editKey').value;
        key ? db.child(key).update(data) : db.push(data);
        alert("Guardado con éxito");
        limpiar();
    }

    function limpiar() {
        ['nombres','cedula','telefono','correo','fechaNac','sexo','cargo','fechaIng','direccion','editKey'].forEach(i => document.getElementById(i).value = "");
        cambiarVista('lista');
    }

    function cargar() {
        db.on('value', snap => {
            let html = '';
            snap.forEach(c => {
                let d = c.val();
                html += `<tr class="fila" data-cedula="${d.cedula}">
                    <td>${d.nombres}</td><td>${d.cedula}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="ver('${c.key}')">Ver</button>
                        <button class="btn btn-sm btn-warning" onclick="edit('${c.key}')">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="db.child('${c.key}').remove()">Del</button>
                    </td>
                </tr>`;
            });
            document.getElementById('tabla-body').innerHTML = html;
        });
    }

    function ver(k) {
        db.child(k).once('value', s => {
            let d = s.val();
            document.getElementById('contenidoDetalles').innerHTML = `<h5>Perfil: ${d.nombres}</h5><p>Cédula: ${d.cedula}<br>Tel: ${d.telefono}<br>Correo: ${d.correo}<br>Cargo: ${d.cargo}</p><button class="btn btn-dark" onclick="bootstrap.Modal.getInstance(document.getElementById('modalDetalles')).hide()">Cerrar</button>`;
            new bootstrap.Modal(document.getElementById('modalDetalles')).show();
        });
    }

    function edit(k) {
        db.child(k).once('value', s => {
            let d = s.val();
            document.getElementById('editKey').value = k;
            document.getElementById('nombres').value = d.nombres;
            document.getElementById('cedula').value = d.cedula;
            cambiarVista('form');
        });
    }

    function filtrar() {
        let v = document.getElementById('buscar').value;
        document.querySelectorAll('.fila').forEach(f => f.style.display = f.dataset.cedula.includes(v) ? "" : "none");
    }
</script>
</body>
</html>
